services:
  - type: web
    name: gym-os-backend
    env: node
    rootDir: backend
    buildCommand: "npm install && npx prisma generate && npm run build"
    startCommand: "npx prisma migrate deploy && npm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gym-os-db
          property: connectionString
      - key: PORT
        value: "3000"
      - key: FRONTEND_URL
        value: "https://your-frontend.vercel.app" # Update this to your actual Vercel URL
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: gym-os-db
    databaseName: gymos
    user: gymos
    plan: free
